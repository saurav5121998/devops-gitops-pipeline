# Overrides for DEV environment — cheaper, fewer replicas
replicaCount: 1

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

autoscaling:
  enabled: false

ingress:
  hosts:
    - host: fastapi-dev.local
      paths:
        - path: /
          pathType: Prefix

env:
  APP_ENV: development
