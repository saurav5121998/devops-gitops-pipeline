name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: fastapi-devops-app
  PYTHON_VERSION: "3.12"

permissions:
  security-events: write
  contents: write
jobs:

  # ─────────────────────────────────────────────────────────
  # JOB 1 — Lint & Unit Tests
  # ─────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install flake8 black

      - name: Lint with flake8
        run: flake8 app/ --max-line-length=100 --exclude=__pycache__,venv
      - name: Format check with black
        run: black --check app/

      - name: Run unit tests with coverage
        run: |
          pip install pytest-cov
          cd app
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/coverage.xml

  # ─────────────────────────────────────────────────────────
  # JOB 2 — Build Docker Image
  # ─────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false       # push happens after security scan
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          load: true        # load into local daemon for Trivy

      - name: Save image tar for next job
        run: |
          docker save ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest \
            -o /tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # ─────────────────────────────────────────────────────────
  # JOB 3 — Security Scanning (Trivy)
  # ─────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/image.tar

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-devops-app:latest
          format: table
          exit-code: "1"          # FAIL pipeline on HIGH/CRITICAL CVEs
          ignore-unfixed: true
          vuln-type: library
          severity: CRITICAL,HIGH

      - name: Run Trivy SARIF report (for GitHub Security tab)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-devops-app:latest
          format: sarif
          output: trivy-results.sarif
        continue-on-error: true   # don't fail again, just upload

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ─────────────────────────────────────────────────────────
  # JOB 4 — Push Image to Registry
  # ─────────────────────────────────────────────────────────
  push:
    name: Push Image to Registry
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/image.tar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-devops-app:latest \
            ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-devops-app:${SHORT_SHA}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-devops-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-devops-app:${SHORT_SHA}
          echo "IMAGE_TAG=${SHORT_SHA}" >> $GITHUB_ENV

      # GitOps: update Helm values with new image tag so ArgoCD picks it up
      - name: Update Helm values with new image tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          sed -i "s/tag:.*/tag: ${SHORT_SHA}/" helm/fastapi-app/values.yaml
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"
          git add helm/fastapi-app/values.yaml
          git diff --cached --quiet || git commit -m "ci: update image tag to ${SHORT_SHA} [skip ci]"
          git push
